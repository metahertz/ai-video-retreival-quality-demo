services:
  app:
    build:
      context: .
      network: host       # apt-get / npm need host DNS during image build
    # host networking: container shares the host network stack directly.
    # Ports bind to the host directly — no mapping needed.
    network_mode: host
    volumes:
      # Full repo bind-mount — backend/videos lives here on the host
      - .:/app
    environment:
      # BACKEND_URL is server-side only — used by Next.js rewrites to proxy
      # /api/* to the backend. Never exposed to the browser.
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8001}
    restart: unless-stopped
