services:
  app:
    build:
      context: .
      network: host       # apt-get / npm need host DNS during image build
    # host networking: container shares the host network stack directly.
    # Ports bind to the host directly — no mapping needed.
    network_mode: host
    volumes:
      # Full repo bind-mount — backend/videos lives here on the host
      - .:/app
    environment:
      # NEXT_PUBLIC_* vars are baked into the browser bundle at build time.
      # Set this to the URL the *browser* uses to reach the backend.
      # Behind a reverse proxy this is the public hostname, not localhost.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8001}
    restart: unless-stopped
